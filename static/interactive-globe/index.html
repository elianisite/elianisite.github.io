      /* Minimal fallback CSS so the app looks correct even if Tailwind CDN fails to load */
      html, body, #root {
        height: 100%;
        max-width: 100%;
        overflow: hidden;
        background: transparent !important;

      body {
        margin: 0;
      }
      main {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        user-select: none;
        background-color: transparent !important;
      }
      /* Ensure the centered container fills the viewport without relying on Tailwind utility classes */
      main > div:first-child {
        position: absolute;
        top: 0; right: 0; bottom: 0; left: 0;
        display: flex;
        align-items: center;
        justify-content: center;

      main > div:first-child > div {

  <body>
    <div id="root"></div>
    <!-- Wheel over an iframe stays inside the iframe. Forward to parent when embedded.
         Batch deltas in requestAnimationFrame so we do not call scrollBy dozens of times per
         second (that fights layout and feels laggy). Ctrl/Cmd+wheel stays in the globe. -->
    <script>
      (function () {
        if (window.parent === window) return;
        var scheduleFrame =
          window.parent.requestAnimationFrame
            ? window.parent.requestAnimationFrame.bind(window.parent)
            : window.requestAnimationFrame.bind(window);
        var pendingY = 0;
        var pendingX = 0;
        var rafId = 0;

        function toPixels(e) {
          var y = e.deltaY;
          var x = e.deltaX;
          if (e.deltaMode === 1) {
            y *= 16;
            x *= 16;
          } else if (e.deltaMode === 2) {
            y *= window.innerHeight || 1;
            x *= window.innerWidth || 1;
          }
          return { x: x, y: y };
        }

        function flush() {
          rafId = 0;
          if (pendingY === 0 && pendingX === 0) return;
          try {
            window.parent.scrollBy({ top: pendingY, left: pendingX, behavior: "instant" });
          } catch (err) {}
          pendingY = 0;
          pendingX = 0;
        }

        window.addEventListener(
          "wheel",
          function (e) {
            if (e.ctrlKey || e.metaKey) return;
            var d = toPixels(e);
            pendingY += d.y;
            pendingX += d.x;
            if (!rafId) {
              rafId = scheduleFrame(flush);
            }
            e.preventDefault();
            e.stopPropagation();
          },
          { passive: false, capture: true }
        );
      })();
    </script>
