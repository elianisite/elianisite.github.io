    (function () {
      var menuButton = document.querySelector(".menu-toggle");
      var siteNav = document.querySelector(".site-nav");
      var menuBackdrop = document.querySelector(".menu-backdrop");
      var mobileBreakpoint = window.matchMedia("(max-width: 980px)");

      if (!menuButton || !siteNav || !menuBackdrop) return;

      function setMenuState(isOpen) {
        document.body.classList.toggle("menu-open", isOpen);
        menuButton.setAttribute("aria-expanded", String(isOpen));
        menuButton.setAttribute("aria-label", isOpen ? "Close menu" : "Open menu");
      }

      menuButton.addEventListener("click", function () {
        var isOpen = menuButton.getAttribute("aria-expanded") !== "true";
        setMenuState(isOpen);
      });

      menuBackdrop.addEventListener("click", function () {
        setMenuState(false);
      });

      siteNav.querySelectorAll("a").forEach(function (link) {
        link.addEventListener("click", function () {
          if (mobileBreakpoint.matches) {
            setMenuState(false);
          }
        });
      });

      function handleMobileBreakpointChange(event) {
        if (!event.matches) {
          setMenuState(false);
        }
      }

      if (typeof mobileBreakpoint.addEventListener === "function") {
        mobileBreakpoint.addEventListener("change", handleMobileBreakpointChange);
      } else if (typeof mobileBreakpoint.addListener === "function") {
        mobileBreakpoint.addListener(handleMobileBreakpointChange);
      }
    })();
  </script>

      function setMeta(selector, attr, value) {
        if (!value) return;

        if (!el) {

      function textFromHtml(html) {

        blocked.forEach(function (node) {

        var elements = template.content.querySelectorAll("*");

      var BLOG_MEDIA_VIDEO_IO_THRESHOLD = 0.1;

      function setupBlogMediaVideoAutoplay(bodyRoot) {
        if (!bodyRoot || !("IntersectionObserver" in window)) return;
        var videos = bodyRoot.querySelectorAll("video.blog-media-video");
        if (!videos.length) return;

        function stateFor(video) {
          if (!video._elianiBlogVp) {
            video._elianiBlogVp = { userPaused: false, suppressPlay: false, viewportPausePending: false };
          }
          return video._elianiBlogVp;
        }

        function pauseForViewport(video) {
          var st = stateFor(video);
          if (video.paused) return;
          st.viewportPausePending = true;
          try {
            video.pause();
          } catch (_) {
            st.viewportPausePending = false;
            return;
          }
          if (!video.paused) {
            st.viewportPausePending = false;
          }
        }

        function playInView(video) {
          if (document.hidden) return;
          var st = stateFor(video);
          st.viewportPausePending = false;
          if (st.userPaused) return;
          st.suppressPlay = true;
          var pr;
          try {
            pr = video.play();
          } catch (_) {
            pr = null;
          }
          queueMicrotask(function () {
            st.suppressPlay = false;
          });
          if (pr && typeof pr.catch === "function") {
            pr.catch(function () {
              video.muted = true;
              var pr2 = video.play();
              if (pr2 && typeof pr2.catch === "function") pr2.catch(function () {});
            });
          }
        }

        var observer = new IntersectionObserver(
          function (entries) {
            entries.forEach(function (entry) {
              var video = entry.target;
              var enough = entry.isIntersecting && entry.intersectionRatio >= BLOG_MEDIA_VIDEO_IO_THRESHOLD;
              if (!enough) {
                pauseForViewport(video);
                return;
              }
              playInView(video);
            });
          },
          { threshold: [0, 0.05, 0.1, 0.25, 0.5, 0.75, 1] }
        );

        Array.prototype.forEach.call(videos, function (video) {
          var st = stateFor(video);
          if (!video.hasAttribute("muted")) video.muted = true;
          video.addEventListener("pause", function () {
            if (st.viewportPausePending) {
              st.viewportPausePending = false;
              return;
            }
            st.userPaused = true;
          });
          video.addEventListener("play", function () {
            if (st.suppressPlay) return;
            st.userPaused = false;
          });
          observer.observe(video);
        });
      }

      var GALLERY_COLS_MIN = 1;
      var GALLERY_COLS_MAX = 6;

      function clampGalleryColumnCount(value, fallback) {
        var n = Math.round(Number(value));
        if (!isFinite(n)) return fallback;

      function galleryTabletColumnCount(minCols, maxCols) {
        var mid = Math.round((minCols + maxCols) / 2);
        if (mid < minCols) return minCols;
        if (mid > maxCols) return maxCols;

      function blogGalleryGridStyleAttr(minCols, maxCols) {

      function normalizeGallerySettings(settings, fileCount) {
        var normalized = {

        var gmin = clampGalleryColumnCount(settings && settings.galleryMinColumns, GALLERY_COLS_MIN);

        }
        normalized.galleryMinColumns = gmin;

        var rawLinks = Array.isArray(settings && settings.imageLinks) ? settings.imageLinks : [];
        var linkCount = Math.max(Number(fileCount) || 0, rawLinks.length);

        }

      function mediaSettingsToAspectCssValue(settings) {
        if (!settings) return null;
        var ar = settings.aspectRatio;
        if (ar === undefined || ar === null || ar === "" || ar === "default") return null;
        if (ar === "custom") {
          var c = settings.aspectRatioCustom || {};

          if (!isFinite(w) || !isFinite(h) || w < 1 || h < 1) return null;
          return w + " / " + h;
        }
        var map = {
          "9:16": "9 / 16",
          "2:3": "2 / 3",
          "3:4": "3 / 4",
          "4:5": "4 / 5",
          "1:1": "1 / 1",

          "16:9": "16 / 9"
        };
        return map[ar] || null;
      }

      function normalizeGalleryLinkHref(value) {
        var href = String(value || "").trim();
        if (!href || /^\s*javascript:/i.test(href)) return "";

        var hasExplicitProtocol = /^[a-z][a-z0-9+.-]*:/i.test(href);
        if (hasExplicitProtocol) {
          try {
            var parsedExplicit = new URL(href);
            if (["http:", "https:", "mailto:", "tel:"].indexOf(parsedExplicit.protocol) === -1) return "";
            return href;
          } catch (_) {
            return "";
          }
        }

        // Same-page / site-relative (browser must not treat as hostname)
        if (/^(?:\/|\?|#|\.\/|\.\.\/)/.test(href)) {
          return href;
        }

        // "//example.com/..." — protocol-relative
        if (/^\/\//.test(href)) {
          return "https:" + href;
        }

        // Looks like "www.google.com" or "google.com/foo" — without a scheme the browser
        // resolves these as paths under the current folder (broken). Prepend https://.
        if (/^www\./i.test(href)) {
          return "https://" + href;
        }

        var commonFileExt = /\.(html?|php|aspx?|jsp|js|css|json|pdf|png|jpe?g|gif|webp|svg|ico|mp4|webm|mov|m4v|txt|md|map)$/i;
        var hostLike = /^([a-z0-9](?:[a-z0-9-]*[a-z0-9])?\.)+[a-z]{2,}$/i;

        var slash = href.indexOf("/");
        if (slash === -1) {
          if (commonFileExt.test(href)) return href;
          if (hostLike.test(href)) return "https://" + href;
          return href;
        }

        var hostPart = href.slice(0, slash);
        if (hostLike.test(hostPart)) {
          return "https://" + href;
        }

        return href;
      }

      function renderGalleryItemInner(item, showCaptions, mediaSettings) {

      function buildGalleryItems(files, fallbackTitle, settings) {
        var normalizedSettings = normalizeGallerySettings(settings, Array.isArray(files) ? files.length : 0);
        var items = [];
        if (!Array.isArray(files)) return items;
        for (var i = 0; i < files.length; i++) {
          var file = files[i] || {};
          var url = file.url || "";
          var fileType = (file.type || "").toLowerCase();
          if (!url) continue;
          var linkHref = normalizeGalleryLinkHref(normalizedSettings.imageLinks[i] || "");
          if (fileType.indexOf("image/") === 0 || isImageUrl(url)) {
            items.push({
              url: url,
              alt: file.caption || fallbackTitle || "Gallery image",
              caption: file.caption || "",
              thumb: file.poster || url,
              sourceIndex: i,
              linkHref: linkHref,
              isVideo: false
            });
          } else if (fileType.indexOf("video/") === 0 || isVideoUrl(url)) {
            items.push({

      async function renderBlockAsync(db, block) {
        if (!block) return "";
        var type = block.blockType || block.type;
        if (type === "subtitle") {
          return '<div class="blog-subtitle-frontend">' + sanitizeRichText(block.content || "") + '</div>';
        }
        if (type === "body") {
          return '<div class="blog-body-frontend">' + sanitizeRichText(block.content || "") + '</div>';
        }
        if (type === "embed") {
          return renderEmbed(block);
        }
        if (type === "media") {
          var mediaSettings = block.mediaSettings || block.slideshowSettings || null;
          if (Array.isArray(block.files) && block.files.length) {
            var inlineGalleryHtml = renderImageGallery(block.files, block.title || block.caption || "Gallery", mediaSettings);
            if (inlineGalleryHtml) return inlineGalleryHtml;
          }
          if (block.cachedMediaUrl) {
            return renderMediaFromUrl(block.cachedMediaUrl, block.caption, block.poster, mediaSettings);
          }
          if (block.mediaId) {
            try {
              var mediaDoc = await db.collection("users").doc(TARGET_USER_UID).collection("items").doc(block.mediaId).get();
              if (mediaDoc.exists) {
                var media = mediaDoc.data();
                if (media && media.files && media.files.length) {
                  var galleryHtml = renderImageGallery(media.files, media.title || block.caption || "Gallery", mediaSettings);
                  if (galleryHtml) return galleryHtml;
                  var file = media.files[0];
                  return renderMediaFromUrl(file.url, file.caption, file.poster, mediaSettings);
                }
              }
            } catch (_) {}
          }
          return renderMediaFromUrl("", block.caption, block.poster, mediaSettings);
        }
        return "";
      }

      function getColumnGroupColumns(block) {
        if (block && Array.isArray(block.columns) && block.columns.length) {
          var mappedColumns = block.columns.slice().sort(function (a, b) {
            return (a.order || 0) - (b.order || 0);
          }).map(function (column, index) {
            return {
              id: column.id || ("column-" + index),
              width: Number(column.width) || 0,
              blocks: Array.isArray(column.blocks) ? column.blocks.slice().sort(function (a, b) {
                return (a.order || 0) - (b.order || 0);
              }) : []
            };
          });

          var totalWidth = mappedColumns.reduce(function (sum, column) {
            return sum + (column.width || 0);
          }, 0);

          if (totalWidth > 0) {
            var runningWidth = 0;
            mappedColumns = mappedColumns.map(function (column, index) {
              var normalizedWidth = index === mappedColumns.length - 1
                ? Math.max(0, 100 - runningWidth)
                : Math.round((column.width / totalWidth) * 100);
              runningWidth += normalizedWidth;
              return {
                id: column.id,
                width: normalizedWidth,
                blocks: column.blocks
              };
            });
          } else {
            var evenWidth = Math.floor(100 / mappedColumns.length);
            mappedColumns = mappedColumns.map(function (column, index) {
              return {
                id: column.id,
                width: index === mappedColumns.length - 1 ? 100 - (evenWidth * (mappedColumns.length - 1)) : evenWidth,
                blocks: column.blocks
              };
            });
          }

          return mappedColumns;
        }

        var leftRatio = block && block.columnRatio && typeof block.columnRatio.left === "number" ? block.columnRatio.left : 50;
        var rightRatio = block && block.columnRatio && typeof block.columnRatio.right === "number" ? block.columnRatio.right : (100 - leftRatio);
        return [
          {
            id: "left",
            width: leftRatio,
            blocks: (block && block.leftColumn ? block.leftColumn : []).slice().sort(function (a, b) {
              return (a.order || 0) - (b.order || 0);
            })
          },
          {
            id: "right",
            width: rightRatio,
            blocks: (block && block.rightColumn ? block.rightColumn : []).slice().sort(function (a, b) {
              return (a.order || 0) - (b.order || 0);
            })
          }
        ];
      }

      async function renderColumnGroup(db, block) {
        if (!block) return "";
        var columns = getColumnGroupColumns(block);
        if (!columns.length) return "";
        var html = '<div class="blog-column-group-frontend">';
        for (var i = 0; i < columns.length; i++) {
          var column = columns[i];
          var width = Number(column.width) || 0;
          html += '<div class="blog-column-frontend" style="flex: 0 1 ' + width + '%; width:' + width + '%;">';
          for (var j = 0; j < column.blocks.length; j++) {
            html += '<div class="blog-block-frontend">' + await renderBlockAsync(db, column.blocks[j]) + '</div>';
          }
          html += '</div>';
        }
        html += '</div>';
        return html;
      }

      async function renderModularBlogContent(db, work) {
        if (!work || !work.sections || !work.sections.length) {
          return work && work.content ? '<div class="blog-body-frontend">' + sanitizeRichText(work.content) + '</div>' : "";
        }
        var html = "";
        var sections = work.sections.slice().sort(function (a, b) {
          return (a.order || 0) - (b.order || 0);
        });
        for (var i = 0; i < sections.length; i++) {
          var section = sections[i];
          var items = (section.items || section.blocks || []).slice().sort(function (a, b) {
            return (a.order || 0) - (b.order || 0);
          });
          if (!items.length) continue;
          html += '<section class="blog-section-frontend">';
          for (var j = 0; j < items.length; j++) {
            var item = items[j];
            var type = item.blockType || item.type;
            if (type === "column-group") {
              html += await renderColumnGroup(db, item);
              continue;
            }
            html += await renderBlockAsync(db, item);
          }
          html += "</section>";
        }
        return html;
      }

          if (work && work.featuredMedia) {
            if (work.featuredMedia.poster && isImageUrl(work.featuredMedia.poster)) return work.featuredMedia.poster;
            if (work.featuredMedia.url && isImageUrl(work.featuredMedia.url)) return work.featuredMedia.url;
          }
          if (work && work.featuredImage && isImageUrl(work.featuredImage)) return work.featuredImage;
          if (work && work.sections) {
            for (var i = 0; i < work.sections.length; i++) {
              var items = work.sections[i].items || work.sections[i].blocks || [];
              for (var j = 0; j < items.length; j++) {
                var item = items[j];
                if (item.cachedMediaUrl && isImageUrl(item.cachedMediaUrl)) return item.cachedMediaUrl;
              }
            }
          }
        } catch (_) {}
        return "";
      }

      function pickFeaturedThumbnailOnly(work) {
        try {
          if (work && work.featuredMedia) {
            if (work.featuredMedia.poster && isImageUrl(work.featuredMedia.poster)) return work.featuredMedia.poster;
            if (work.featuredMedia.url && isImageUrl(work.featuredMedia.url)) return work.featuredMedia.url;
          }
          if (work && work.featuredImage && isImageUrl(work.featuredImage)) return work.featuredImage;
        } catch (_) {}
        return "";
      }

      function featuredMediaIsVideo(work) {
        if (!work || !work.featuredMedia || !work.featuredMedia.url) return false;
        var u = String(work.featuredMedia.url).trim();
        if (!u) return false;
        if (isVideoUrl(u)) return true;
        var typ = work.featuredMedia.type && String(work.featuredMedia.type).toLowerCase();
        return !!(typ && typ.indexOf("video") !== -1);
      }

      function pickFeaturedHeroMedia(work) {
        try {
          if (work && work.featuredMedia && work.featuredMedia.url && featuredMediaIsVideo(work)) {
            var vUrl = String(work.featuredMedia.url).trim();
            var poster = "";
            if (work.featuredMedia.poster && isImageUrl(work.featuredMedia.poster)) {
              poster = work.featuredMedia.poster;
            } else {
              var t = pickFeaturedThumbnailOnly(work);
              if (t && isImageUrl(t)) poster = t;
            }
            return { type: "video", videoUrl: vUrl, posterUrl: poster };
          }
          if (work && work.featuredImage) {
            var fi = String(work.featuredImage).trim();
            if (fi && isVideoUrl(fi)) {
              var p2 = "";
              var t2 = pickFeaturedThumbnailOnly(work);
              if (t2 && isImageUrl(t2)) p2 = t2;
              return { type: "video", videoUrl: fi, posterUrl: p2 };
            }
          }
        } catch (_) {}
        var img = pickFeaturedThumbnailOnly(work);
        if (img) {
          return { type: "image", imageUrl: img };
        }
        return { type: "none" };
      }

          video.muted = true;

          } catch (_) {}
          var p = video.play();
          if (p && typeof p.catch === "function") {
            p.catch(function () {});
          }
        }
        tryPlay();
        video.addEventListener("loadeddata", tryPlay, { once: true });
        video.addEventListener("canplay", tryPlay, { once: true });
        function onVisibility() {
          if (document.hidden) {
            try {
              video.pause();
            } catch (_) {}
          } else {

          }
        }
        document.addEventListener("visibilitychange", onVisibility);

      function createViewerController() {
        var viewer = document.getElementById("eliani-gallery-viewer");
        var closeBtn = viewer ? viewer.querySelector(".eliani-viewer-close") : null;
        var prevBtn = viewer ? viewer.querySelector(".eliani-viewer-nav--prev") : null;
        var nextBtn = viewer ? viewer.querySelector(".eliani-viewer-nav--next") : null;
        var image = document.getElementById("eliani-gallery-image");
        var video = document.getElementById("eliani-gallery-video");
        var caption = document.getElementById("eliani-gallery-caption");
        var thumbs = document.getElementById("eliani-gallery-thumbs");
        var viewport = document.getElementById("eliani-gallery-viewport");
        if (!viewer || !closeBtn || !prevBtn || !nextBtn || !image || !caption || !thumbs || !viewport) {
          return null;
        }

        var state = {
          galleryId: "",
          index: 0,
          touchStartX: 0
        };
        var viewerCloseGeneration = 0;

        function getItems() {
          return galleryStore[state.galleryId] || [];
        }

        function renderThumbs(items) {
          thumbs.innerHTML = items.map(function (item, index) {
            var activeClass = index === state.index ? " is-active" : "";
            return '' +
              '<button class="eliani-viewer-thumb' + activeClass + '" type="button" data-thumb-index="' + index + '" aria-label="Show image ' + (index + 1) + '">' +
                '<img loading="lazy" src="' + escapeHtml(item.thumb || item.url) + '" alt="' + escapeHtml(item.alt || "Thumbnail") + '">' +
              '</button>';
          }).join("");
          var activeThumb = thumbs.querySelector('.eliani-viewer-thumb.is-active');
          if (activeThumb && activeThumb.scrollIntoView) {
            activeThumb.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
          }
        }

        function render() {
          var items = getItems();
          if (!items.length) return;
          var current = items[state.index];
          if (current.isVideo && video) {
            image.style.display = "none";
            image.removeAttribute("src");
            image.alt = "";
            video.style.display = "block";
            try {
              video.pause();
            } catch (_) {}
            video.src = current.url;
            if (current.thumb && current.thumb !== current.url) {
              video.setAttribute("poster", current.thumb);
            } else {
              video.removeAttribute("poster");
            }
          } else {
            if (video) {
              try {
                video.pause();
              } catch (_) {}
              video.removeAttribute("src");
              video.style.display = "none";
            }
            image.style.display = "";
            image.src = current.url;
            image.alt = current.alt || "Gallery image";
          }
          caption.textContent = current.caption || "";
          renderThumbs(items);
        }

        function open(galleryId, index) {
          viewerCloseGeneration += 1;
          state.galleryId = galleryId;
          state.index = index || 0;
          viewer.setAttribute("aria-hidden", "false");
          document.body.classList.add("eliani-viewer-open");
          render();
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              viewer.classList.add("is-open");
              closeBtn.focus();
            });
          });
        }

        function finalizeViewerClose() {
          viewer.setAttribute("aria-hidden", "true");
          document.body.classList.remove("eliani-viewer-open");
          image.removeAttribute("src");
          image.alt = "";
          image.style.display = "";
          if (video) {
            try {
              video.pause();
            } catch (_) {}
            video.removeAttribute("src");
            video.style.display = "none";
          }
          caption.textContent = "";
          thumbs.innerHTML = "";
          state.galleryId = "";
          state.index = 0;
        }

        function close() {
          if (!viewer.classList.contains("is-open")) return;
          var myGen = viewerCloseGeneration;
          viewer.classList.remove("is-open");
          var done = false;
          function complete() {
            if (done) return;
            if (viewer.classList.contains("is-open")) return;
            if (viewerCloseGeneration !== myGen) return;
            done = true;
            finalizeViewerClose();
          }
          var fallbackMs = 520;
          var fallback = setTimeout(function () {
            viewer.removeEventListener("transitionend", onTransitionEnd);
            complete();
          }, fallbackMs);
          function onTransitionEnd(ev) {
            if (ev.target !== viewer || ev.propertyName !== "opacity") return;
            clearTimeout(fallback);
            viewer.removeEventListener("transitionend", onTransitionEnd);
            complete();
          }
          viewer.addEventListener("transitionend", onTransitionEnd);
        }

        function step(direction) {
          var items = getItems();
          if (!items.length) return;
          state.index = (state.index + direction + items.length) % items.length;
          render();
        }

        function goTo(index) {
          var items = getItems();
          if (!items.length || index < 0 || index >= items.length) return;
          state.index = index;
          render();
        }

        closeBtn.addEventListener("click", close);
        prevBtn.addEventListener("click", function () {
          step(-1);
        });
        nextBtn.addEventListener("click", function () {
          step(1);
        });
        viewer.addEventListener("click", function (event) {
          if (!viewer.classList.contains("is-open")) return;
          var t = event.target;
          if (!t || typeof t.closest !== "function") return;
          if (t.id === "eliani-gallery-image" || t.id === "eliani-gallery-video" || t.closest("#eliani-gallery-image") || t.closest("#eliani-gallery-video")) return;
          if (t.closest(".eliani-viewer-close")) return;
          if (t.closest(".eliani-viewer-nav")) return;
          if (t.closest(".eliani-viewer-thumbs")) return;
          close();
        });
        thumbs.addEventListener("click", function (event) {
          var thumb = event.target.closest("[data-thumb-index]");
          if (!thumb) return;
          goTo(Number(thumb.getAttribute("data-thumb-index")) || 0);
        });
        document.addEventListener("keydown", function (event) {
          if (!viewer.classList.contains("is-open")) return;
          if (event.key === "Escape") {
            close();
          } else if (event.key === "ArrowLeft") {
            event.preventDefault();
            step(-1);
          } else if (event.key === "ArrowRight") {
            event.preventDefault();
            step(1);
          }
        });
        viewport.addEventListener("touchstart", function (event) {
          if (!event.changedTouches || !event.changedTouches.length) return;
          state.touchStartX = event.changedTouches[0].clientX;
        }, { passive: true });
        viewport.addEventListener("touchend", function (event) {
          if (!event.changedTouches || !event.changedTouches.length) return;
          var touchEndX = event.changedTouches[0].clientX;
          var deltaX = touchEndX - state.touchStartX;
          if (Math.abs(deltaX) < 40) return;
          if (deltaX > 0) {
            step(-1);
          } else {
            step(1);
          }
        }, { passive: true });

        return {
          open: open
        };
      }

      function buildRelatedCardHtml(post) {
        var image = pickThumbnailFromWork(post) || PLACEHOLDER_IMAGE;
        var title = escapeHtml(post.title || "Untitled");
        var category = escapeHtml(post.category || "Selected work");
        var excerpt = escapeHtml(getSummary(post));
        return '' +
          '<a class="eliani-related-card" href="' + buildWorkHref(post) + '" aria-label="Open ' + title + '">' +
            '<div class="eliani-related-card-media">' +
              '<img loading="lazy" src="' + escapeHtml(image) + '" alt="' + title + '">' +
            '</div>' +
            '<div class="eliani-related-card-body">' +
              '<p class="eliani-kicker">' + category + '</p>' +
              '<h3>' + title + '</h3>' +
              '<p class="eliani-related-card-excerpt">' + excerpt + "</p>" +
            '</div>' +
          '</a>';
      }

      async function queryWorks(db) {
        try {
          var orderedSnap = await db.collection("users").doc(TARGET_USER_UID)
            .collection("items")
            .where("type", "==", "blog")
            .orderBy("datePosted", "desc")
            .get();
          var orderedPosts = [];
          orderedSnap.forEach(function (doc) {
            orderedPosts.push(normalizeWork(Object.assign({ id: doc.id }, doc.data())));
          });
          return orderedPosts;
        } catch (_) {
          var snap = await db.collection("users").doc(TARGET_USER_UID)
            .collection("items")
            .where("type", "==", "blog")
            .get();
          var posts = [];
          snap.forEach(function (doc) {
            posts.push(normalizeWork(Object.assign({ id: doc.id }, doc.data())));
          });
          return posts;
        }
      }

      async function renderRelatedWork(db, currentId) {
        var container = document.getElementById("related-work-container");
        var section = document.getElementById("related-work-section");
        if (!container || !section) return;
        try {
          var posts = await queryWorks(db);
          posts = posts.filter(function (post) {
            return post.id !== currentId && !hasSitepageTag(post);
          });
          if (!posts.length) {
            section.hidden = true;
            return;
          }
          for (var i = posts.length - 1; i > 0; i--) {
            var swapIndex = Math.floor(Math.random() * (i + 1));
            var temp = posts[i];
            posts[i] = posts[swapIndex];
            posts[swapIndex] = temp;
          }
          container.innerHTML = posts.slice(0, 3).map(buildRelatedCardHtml).join("");
        } catch (_) {
          section.hidden = true;
        }
      }

      async function bindPostPager(db, currentId) {
        var prevBtn = document.querySelector('.eliani-pager-btn[data-dir="prev"]');
        var nextBtn = document.querySelector('.eliani-pager-btn[data-dir="next"]');
        if (!prevBtn || !nextBtn) return;
        try {
          var posts = await queryWorks(db);
          if (posts.length < 2) {
            prevBtn.hidden = true;
            nextBtn.hidden = true;
            return;
          }
          var currentIndex = 0;
          for (var i = 0; i < posts.length; i++) {
            if (posts[i].id === currentId) {
              currentIndex = i;
              break;
            }
          }
          var prevPost = posts[(currentIndex - 1 + posts.length) % posts.length];
          var nextPost = posts[(currentIndex + 1) % posts.length];

          prevBtn.addEventListener("click", function () {
            window.location.href = buildWorkHref(prevPost);
          });
          nextBtn.addEventListener("click", function () {
            window.location.href = buildWorkHref(nextPost);
          });
          document.addEventListener("keydown", function (event) {
            if (event.key === "ArrowLeft") {
              window.location.href = buildWorkHref(prevPost);
            } else if (event.key === "ArrowRight") {
              window.location.href = buildWorkHref(nextPost);
            }
          });
        } catch (_) {}
      }

      async function run() {
        var content = document.getElementById("work-content");
        var viewerController = createViewerController();
        if (!content) return;

        disposeElianiHeroVideo();

        var slug = getWorkSlugFromLocation();
        if (!slug) {
          content.innerHTML = renderStatus("Missing item", "No work item specified.", "Please return to the site and choose a work.");
          return;
        }

        if (!safeInitFirebase() || !window.firebase) {
          content.innerHTML = renderStatus("Unavailable", "Firestore could not be initialised.", "The detail page is ready, but content is unavailable right now.");
          return;
        }

        try {
          var db = firebase.firestore();
          var posts = await queryWorks(db);
          var work = null;
          var currentId = "";
          for (var i = 0; i < posts.length; i++) {
            if (normalizeSlug(posts[i].title) === normalizeSlug(slug)) {
              work = posts[i];
              currentId = posts[i].id;
              break;
            }
          }

          if (!work) {
            var snap = await db.collection("users").doc(TARGET_USER_UID).collection("items").doc(slug).get();
            if (snap.exists) {
              work = normalizeWork(Object.assign({ id: snap.id }, snap.data()));
              currentId = snap.id;
            }
          }

          if (!work) {
            content.innerHTML = renderStatus("Not found", "That work could not be found.", "Please return to the site and try another selection.");
            return;
          }

          var title = escapeHtml(work.title || "Untitled");
          var category = escapeHtml(getWorkKicker(work));
          var metaLabel = escapeHtml(getWorkMeta(work));
          var summary = escapeHtml(getSummary(work));
          var tagsHtml = parseCsv(work.tags || work.keywords || "").map(function (tag) {
            return '<span class="eliani-tag">' + escapeHtml(tag) + '</span>';
          }).join("");
          var heroMedia = pickFeaturedHeroMedia(work);

          var bodyHtml = await renderModularBlogContent(db, work);

          var artistBackHref = artistBackHrefFromWork(work);
          var artistBackAria =
            work && work.category != null && String(work.category).trim()
              ? "Back to " + String(work.category).trim()
              : "Back to artists";

          content.innerHTML =
            buildElianiWorkHeroHtml(heroMedia, title, category, summary, artistBackHref, artistBackAria) +
            '<section class="eliani-work-body reveal-on-scroll">' + bodyHtml + '</section>' +
            '<div class="eliani-related-logo-wrap reveal-on-scroll">' +
              '<a class="eliani-related-logo-link" href="../index.html" aria-label="Eliani Studios — Home">' +
                '<img class="eliani-related-logo" src="../static/assets/eliani-logo-related.png" alt="" width="400" height="200" loading="lazy" decoding="async">' +
              '</a>' +
            '</div>' +
            '<section class="eliani-related-section reveal-on-scroll" id="related-work-section" aria-labelledby="related-work-title">' +
              '<div class="eliani-related-heading">' +
                '<div>' +
                  '<p class="eliani-kicker">More Works</p>' +
                  '<h2 id="related-work-title">Related selections</h2>' +
                '</div>' +
              '</div>' +
              '<div class="eliani-related-grid" id="related-work-container"></div>' +
              '<div class="eliani-pager">' +
                '<button class="eliani-pager-btn" type="button" data-dir="prev">Previous work</button>' +
                '<button class="eliani-pager-btn" type="button" data-dir="next">Next work</button>' +
              '</div>' +
            '</section>';

          updateSocialMeta(work);
          renderRelatedWork(db, currentId);
          bindPostPager(db, currentId);

          registerElianiHeroVideoLifecycle(content.querySelector(".eliani-work-hero"));

          var revealMotionPreference = window.matchMedia("(prefers-reduced-motion: reduce)");
          var revealElements = Array.prototype.slice.call(document.querySelectorAll(".reveal-on-scroll"));
          if (revealMotionPreference.matches || !("IntersectionObserver" in window)) {
            revealElements.forEach(function (element) {
              element.classList.add("is-visible");
            });
          } else {
            var workBodyRevealMs = 500;
            var workBodyEl = content.querySelector(".eliani-work-body.reveal-on-scroll");
            revealElements.forEach(function (element, index) {
              element.style.setProperty("--reveal-delay", index * 80 + "ms");
            });
            if (workBodyEl) {
              workBodyEl.style.setProperty("--reveal-delay", "0ms");
            }
            var revealObserver = new IntersectionObserver(function (entries, observer) {
              entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                  entry.target.classList.add("is-visible");
                  observer.unobserve(entry.target);
                }
              });
            }, {
              threshold: 0.08,
              rootMargin: "0px 0px -8% 0px"
            });
            revealElements.forEach(function (element) {
              if (element === workBodyEl) return;
              revealObserver.observe(element);
            });
            if (workBodyEl) {
              window.setTimeout(function () {
                workBodyEl.classList.add("is-visible");
              }, workBodyRevealMs);
            }
          }

          content.addEventListener("click", function (event) {
            var trigger = event.target.closest(".blog-gallery-trigger");
            if (!trigger || !viewerController) return;
            viewerController.open(
              trigger.getAttribute("data-gallery-id"),
              Number(trigger.getAttribute("data-gallery-index")) || 0
            );
          });

          var workBodyRoot = content.querySelector(".eliani-work-body");
          setupBlogMediaVideoAutoplay(workBodyRoot);
        } catch (_) {
          content.innerHTML = renderStatus("Error", "The work could not be loaded.", "Please try again shortly.");
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", run);
      } else {
        run();
      }
    })();
  </script>
</body>
